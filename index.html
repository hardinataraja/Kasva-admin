<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Kasva Admin Panel - Fixed</title>
  <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#6C63FF">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/906/906343.png">

<script>
  // Mendaftarkan Service Worker sederhana
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').then(reg => {
        console.log('PWA: Service Worker Terdaftar', reg.scope);
      }).catch(err => {
        console.log('PWA: Gagal mendaftar', err);
      });
    });
  }
</script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --primary:#6C63FF; --success:#059669; --warning:#D97706;
  --error:#DC2626; --bg:#F4F6FB; --card:#FFF;
  --text:#1A1D23; --muted:#6B7280; --border:#E5E7EB; --gold:#F59E0B; --purple:#8B5CF6;
}
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

/* Login */
#loginScreen { display:flex; align-items:center; justify-content:center; min-height:100vh; background:linear-gradient(135deg,#6C63FF 0%,#8B5CF6 100%); padding:24px; }
.login-box { background:white; border-radius:20px; padding:32px 28px; width:100%; max-width:380px; box-shadow:0 20px 60px rgba(108,99,255,.3); }
.login-logo { text-align:center; margin-bottom:24px; }
.logo-icon { width:72px; height:72px; border-radius:18px; background:linear-gradient(135deg,#6C63FF,#8B5CF6); display:flex; align-items:center; justify-content:center; margin:0 auto 12px; font-size:30px; }
.login-logo h1 { font-size:22px; color:var(--primary); font-weight:700; }
.form-group { margin-bottom:14px; }
.form-group label { display:block; font-size:13px; font-weight:600; margin-bottom:6px; }
.form-group input { width:100%; padding:12px 14px; border:1.5px solid var(--border); border-radius:10px; font-size:14px; outline:none; }
.btn-primary { width:100%; padding:13px; background:var(--primary); color:white; border:none; border-radius:10px; font-size:15px; font-weight:600; cursor:pointer; }

/* App Dashboard */
#appScreen { display:none; }
.top-bar { background:linear-gradient(135deg,#6C63FF 0%,#8B5CF6 100%); padding:14px 16px; position:sticky; top:0; z-index:100; color:white; }
.top-bar-inner { display:flex; align-items:center; justify-content:space-between; max-width:800px; margin:0 auto; }
.main { padding:16px; max-width:800px; margin:0 auto; }

/* Stats */
.stats-grid { display:grid; grid-template-columns: repeat(2, 1fr); gap:12px; margin-bottom:20px; }
.stat-card { background:white; border-radius:16px; padding:16px; box-shadow:0 2px 8px rgba(0,0,0,.05); text-align:center; }
.stat-card.full { grid-column: span 2; border: 2px solid var(--purple); background: #f9f8ff; }
.stat-card .num { font-size:24px; font-weight:800; display:block; }
.stat-card .lbl { font-size:12px; color:var(--muted); }
.stat-card.purple .num { color: var(--purple); font-size: 32px; }
.stat-card.blue .num { color: var(--primary); }
.stat-card.green .num { color: var(--success); }

/* Tabs */
.tabs { display:flex; background:white; padding:6px; border-radius:14px; margin-bottom:16px; gap:4px; box-shadow:0 2px 8px rgba(0,0,0,.05); }
.tab { flex:1; padding:10px; border:none; border-radius:10px; font-size:14px; font-weight:600; cursor:pointer; color:var(--muted); background:none; transition: 0.2s; }
.tab.active { background:var(--primary); color:white; }

/* Lists */
.user-card, .inv-card { background:white; border-radius:16px; padding:16px; margin-bottom:12px; box-shadow:0 2px 8px rgba(0,0,0,.05); }
.avatar { width:45px; height:45px; border-radius:12px; background:linear-gradient(135deg,#6C63FF,#8B5CF6); display:flex; align-items:center; justify-content:center; font-weight:700; color:white; }
.badge { padding:4px 10px; border-radius:20px; font-size:11px; font-weight:700; text-transform:uppercase; }
.badge-pro { background:#EDE9FE; color:#6C63FF; }
.badge-free { background:#F3F4F6; color:#6B7280; }

.toolbar { display:flex; gap:10px; margin-bottom:15px; }
.toolbar input { flex:1; padding:10px; border-radius:10px; border:1px solid var(--border); outline:none; }
.btn-verify { width:100%; padding:12px; background:var(--success); color:white; border:none; border-radius:10px; font-weight:700; margin-top:10px; cursor:pointer; }

/* Modal */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center; padding:20px; }
.modal-overlay.open { display:flex; }
.modal { background:white; width:100%; max-width:500px; border-radius:20px; padding:24px; position:relative; animation: slideUp 0.3s; }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.detail-row { display:flex; justify-content:space-between; margin-bottom:12px; font-size:14px; border-bottom:1px solid #F9F9F9; padding-bottom:8px; }
.toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#333; color:white; padding:10px 20px; border-radius:10px; display:none; z-index:2000; }
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo"><div class="logo-icon">⚡</div><h1>Kasva Admin</h1></div>
    <div class="form-group"><label>Email Admin</label><input type="email" id="loginEmail" placeholder="admin@email.com"></div>
    <div class="form-group"><label>Password</label><input type="password" id="loginPass" placeholder="••••••••"></div>
    <button class="btn-primary" onclick="doLogin()">Login Ke Panel</button>
  </div>
</div>

<div id="appScreen">
  <div class="top-bar">
    <div class="top-bar-inner">
      <h2 style="font-size:18px">Panel Kontrol Kasva</h2>
      <button onclick="auth.signOut()" style="background:none; border:1px solid white; color:white; padding:5px 10px; border-radius:8px; font-size:12px; cursor:pointer">Keluar</button>
    </div>
  </div>

  <div class="main">
    <div class="stats-grid">
        <div class="stat-card full purple"><span class="num" id="statRevenue">Rp 0</span><span class="lbl">Total Pendapatan (Verified)</span></div>
        <div class="stat-card blue"><span class="num" id="statTotal">0</span><span class="lbl">Total Pengguna</span></div>
        <div class="stat-card green"><span class="num" id="statPro">0</span><span class="lbl">Pengguna Pro</span></div>
    </div>

    <div class="tabs">
      <button class="tab active" id="tabUsers" onclick="switchTab('users')">Database User</button>
      <button class="tab" id="tabInvoices" onclick="switchTab('invoices')">
        Invoice <span id="pendingBadge" style="background:red; color:white; padding:2px 6px; border-radius:10px; font-size:10px; display:none">0</span>
      </button>
    </div>

    <div id="sectionUsers">
        <div class="toolbar">
            <input type="text" id="searchInput" placeholder="Cari nama, email, atau toko..." oninput="renderUsers()">
            <button onclick="loadUsers()" style="background:none; border:none; font-size:20px; cursor:pointer">↻</button>
        </div>
        <div id="userList"></div>
    </div>

    <div id="sectionInvoices" style="display:none"><div id="invoiceList"></div></div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
        <h3 style="margin-bottom:15px">Detail Pengguna</h3>
        <div id="modalBody"></div>
        <div style="margin-top:20px; background:#F4F6FB; padding:15px; border-radius:12px">
            <label style="font-size:12px; font-weight:700">GANTI STATUS MANUAL</label>
            <select id="editPlan" style="width:100%; padding:10px; margin:8px 0; border-radius:8px; border:1px solid #ddd">
                <option value="free">FREE</option>
                <option value="pro">PRO (Aktif 1 Bulan)</option>
            </select>
            <button class="btn-primary" onclick="saveManualUpdate()">Update Sekarang</button>
        </div>
        <button onclick="closeModal()" style="position:absolute; top:15px; right:15px; border:none; background:none; font-size:20px; cursor:pointer">✕</button>
    </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDVCEAaOUJ2_a8uxQw2QvOtpBjVwI6IRR0",
  authDomain: "kasva-d19fa.firebaseapp.com",
  projectId: "kasva-d19fa",
  storageBucket: "kasva-d19fa.firebasestorage.app",
  messagingSenderId: "110994025196",
  appId: "1:110994025196:android:6f38ac65f6852c763493c9"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let allUsers = [];
let allInvoices = [];
let selectedUid = null;

auth.onAuthStateChanged(user => {
  if (user) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appScreen').style.display = 'block';
    loadUsers(); loadInvoices();
  } else {
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('appScreen').style.display = 'none';
  }
});

function doLogin() {
  const e = document.getElementById('loginEmail').value;
  const p = document.getElementById('loginPass').value;
  auth.signInWithEmailAndPassword(e, p).catch(err => alert("Login Gagal: " + err.message));
}

function loadUsers() {
    db.collection('users').get().then(snap => {
        allUsers = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        renderUsers(); updateStats();
    });
}

function loadInvoices() {
    db.collection('invoices').get().then(snap => {
        allInvoices = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        renderInvoices(); updateStats();
    });
}

function updateStats() {
    document.getElementById('statTotal').textContent = allUsers.length;
    document.getElementById('statPro').textContent = allUsers.filter(u => u.plan === 'pro').length;
    const rev = allInvoices.filter(i => i.status === 'verified').reduce((acc, curr) => acc + (Number(curr.totalAmount)||0) + (Number(curr.uniqueCode)||0), 0);
    document.getElementById('statRevenue').textContent = 'Rp ' + rev.toLocaleString('id-ID');
    const pending = allInvoices.filter(i => i.status === 'pending').length;
    const badge = document.getElementById('pendingBadge');
    badge.textContent = pending; badge.style.display = pending > 0 ? 'inline-block' : 'none';
}

function renderUsers() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const list = document.getElementById('userList');
    const filtered = allUsers.filter(u => {
        const s = u.settings || {};
        return (u.name||"").toLowerCase().includes(q) || (u.email||"").toLowerCase().includes(q) || (s.storeName||"").toLowerCase().includes(q);
    });

    list.innerHTML = filtered.map(u => {
        const s = u.settings || {};
        return `
            <div class="user-card" onclick="openUser('${u.id}')" style="display:flex; align-items:center; gap:15px; cursor:pointer">
                <div class="avatar">${(u.name || "U")[0].toUpperCase()}</div>
                <div style="flex:1">
                    <div style="font-weight:700">${u.name || 'User Kasva'}</div>
                    <div style="font-size:12px; color:var(--muted)">${s.storeName || 'Belum Set Toko'} • ${u.email || '-'}</div>
                </div>
                <span class="badge badge-${u.plan || 'free'}">${u.plan || 'free'}</span>
            </div>
        `;
    }).join('');
}

function renderInvoices() {
    const list = document.getElementById('invoiceList');
    if (allInvoices.length === 0) { list.innerHTML = '<p style="text-align:center; padding:20px; color:#999">Tidak ada tagihan</p>'; return; }
    const sorted = [...allInvoices].sort((a,b) => (a.status === 'pending' ? -1 : 1));
    list.innerHTML = sorted.map(inv => {
        const user = allUsers.find(u => u.id === inv.uid);
        const total = (Number(inv.totalAmount) || 0) + (Number(inv.uniqueCode) || 0);
        const isPending = inv.status === 'pending';
        return `
            <div class="inv-card" style="border-left: 5px solid ${isPending ? 'var(--warning)' : 'var(--success)'}">
                <div style="display:flex; justify-content:space-between; margin-bottom:8px">
                    <span style="font-weight:700">${user ? user.name : 'User Terhapus'}</span>
                    <span class="badge" style="background:${isPending ? '#FEF3C7' : '#D1FAE5'}; color:${isPending ? '#D97706' : '#059669'}">${inv.status}</span>
                </div>
                <div style="font-size:20px; font-weight:800; color:var(--primary)">Rp ${total.toLocaleString('id-ID')}</div>
                <div style="font-size:11px; color:var(--muted)">Ref: ${inv.id.slice(-6)} • ${inv.createdAt ? new Date(inv.createdAt).toLocaleDateString('id-ID') : '-'}</div>
                ${isPending ? `<button class="btn-verify" onclick="verifyUpgrade('${inv.id}', '${inv.uid}')">VERIFIKASI PEMBAYARAN</button>` : ''}
            </div>
        `;
    }).join('');
}

function openUser(uid) {
    selectedUid = uid;
    const u = allUsers.find(x => x.id === uid);
    if(!u) return;
    const s = u.settings || {};
    // FIX: Ambil phone dan address dari dalam u.settings
    document.getElementById('modalBody').innerHTML = `
        <div class="detail-row"><span>Nama</span><b>${u.name || '-'}</b></div>
        <div class="detail-row"><span>Toko</span><b>${s.storeName || '-'}</b></div>
        <div class="detail-row"><span>WhatsApp</span><b><a href="https://wa.me/${s.phone}" target="_blank" style="color:var(--primary); text-decoration:none">${s.phone || '-'} ↗</a></b></div>
        <div class="detail-row"><span>Alamat</span><b>${s.address || '-'}</b></div>
        <div class="detail-row"><span>Email</span><b>${u.email || '-'}</b></div>
        <div class="detail-row"><span>Plan Expired</span><b>${u.planExpiry ? new Date(u.planExpiry).toLocaleDateString('id-ID') : '-'}</b></div>
    `;
    document.getElementById('editPlan').value = u.plan || 'free';
    document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

function verifyUpgrade(invId, uid) {
    if(!confirm("Konfirmasi dana sudah masuk?")) return;
    const expiry = new Date(); expiry.setMonth(expiry.getMonth() + 1);
    db.collection('invoices').doc(invId).update({ status: 'verified' }).then(() => {
        return db.collection('users').doc(uid).update({ plan: 'pro', planExpiry: expiry.toISOString() });
    }).then(() => { showToast("✓ Berhasil Verifikasi"); loadUsers(); loadInvoices(); });
}

function saveManualUpdate() {
    const p = document.getElementById('editPlan').value;
    const up = { plan: p };
    if(p === 'pro') { const ex = new Date(); ex.setMonth(ex.getMonth() + 1); up.planExpiry = ex.toISOString(); }
    db.collection('users').doc(selectedUid).update(up).then(() => { showToast("✓ Data Diupdate"); closeModal(); loadUsers(); });
}

function switchTab(t) {
    document.getElementById('sectionUsers').style.display = t === 'users' ? 'block' : 'none';
    document.getElementById('sectionInvoices').style.display = t === 'invoices' ? 'block' : 'none';
    document.getElementById('tabUsers').className = 'tab' + (t === 'users' ? ' active' : '');
    document.getElementById('tabInvoices').className = 'tab' + (t === 'invoices' ? ' active' : '');
}

function showToast(msg) {
    const t = document.getElementById('toast'); t.textContent = msg; t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 3000);
}
</script>
</body>
</html>
