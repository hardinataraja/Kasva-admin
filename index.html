<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Kasva Admin</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --primary: #6C63FF;
    --success: #059669;
    --warning: #D97706;
    --error:   #DC2626;
    --bg:      #F4F6FB;
    --card:    #FFFFFF;
    --text:    #1A1D23;
    --muted:   #6B7280;
    --border:  #E5E7EB;
    --gold:    #F59E0B;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Login ── */
  #loginScreen {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
    background: linear-gradient(135deg, #6C63FF 0%, #8B5CF6 100%);
    padding: 24px;
  }
  .login-box {
    background: white; border-radius: 20px; padding: 32px 28px;
    width: 100%; max-width: 380px;
    box-shadow: 0 20px 60px rgba(108,99,255,0.3);
  }
  .login-logo {
    text-align: center; margin-bottom: 24px;
  }
  .login-logo img {
    width: 72px; height: 72px; border-radius: 18px;
    object-fit: cover; margin-bottom: 12px;
    box-shadow: 0 8px 20px rgba(108,99,255,0.25);
  }
  .login-logo h1 { font-size: 22px; color: var(--primary); font-weight: 700; }
  .login-logo p  { font-size: 13px; color: var(--muted); margin-top: 2px; }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: var(--text); }
  .form-group input {
    width: 100%; padding: 12px 14px; border: 1.5px solid var(--border);
    border-radius: 10px; font-size: 14px; outline: none;
    transition: border-color .2s;
  }
  .form-group input:focus { border-color: var(--primary); }
  .btn-primary {
    width: 100%; padding: 13px; background: var(--primary);
    color: white; border: none; border-radius: 10px;
    font-size: 15px; font-weight: 600; cursor: pointer;
    transition: opacity .2s;
  }
  .btn-primary:hover { opacity: .88; }
  .error-msg { color: var(--error); font-size: 12px; margin-top: 8px; text-align: center; }

  /* ── App Shell ── */
  #appScreen { display: none; }
  .top-bar {
    background: linear-gradient(135deg, #6C63FF 0%, #8B5CF6 100%);
    padding: 14px 16px; position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 12px rgba(108,99,255,0.3);
  }
  .top-bar-inner {
    display: flex; align-items: center; justify-content: space-between;
    max-width: 700px; margin: 0 auto;
  }
  .top-bar h1 { color: white; font-size: 18px; font-weight: 700; }
  .top-bar-right { display: flex; align-items: center; gap: 10px; }
  .admin-badge {
    background: rgba(255,255,255,0.2); color: white;
    padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600;
  }
  .btn-logout {
    background: rgba(255,255,255,0.15); color: white;
    border: 1px solid rgba(255,255,255,0.3);
    padding: 6px 12px; border-radius: 8px; font-size: 13px; cursor: pointer;
  }

  .main { padding: 16px; max-width: 700px; margin: 0 auto; }

  /* ── Stats ── */
  .stats-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 10px; margin-bottom: 16px;
  }
  .stat-card {
    background: white; border-radius: 14px; padding: 14px 10px;
    text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .stat-card .num { font-size: 24px; font-weight: 700; }
  .stat-card .lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .stat-card.blue .num  { color: var(--primary); }
  .stat-card.green .num { color: var(--success); }
  .stat-card.gold .num  { color: var(--gold); }

  /* ── Toolbar ── */
  .toolbar {
    background: white; border-radius: 14px; padding: 12px;
    margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
  }
  .toolbar input[type=text] {
    flex: 1; min-width: 140px; padding: 9px 12px;
    border: 1.5px solid var(--border); border-radius: 8px;
    font-size: 13px; outline: none;
  }
  .toolbar input[type=text]:focus { border-color: var(--primary); }
  .toolbar select {
    padding: 9px 10px; border: 1.5px solid var(--border);
    border-radius: 8px; font-size: 13px; outline: none;
    background: white; cursor: pointer;
  }
  .btn-refresh {
    padding: 9px 14px; background: var(--primary); color: white;
    border: none; border-radius: 8px; font-size: 13px;
    cursor: pointer; font-weight: 600; white-space: nowrap;
  }

  /* ── User Cards ── */
  .user-card {
    background: white; border-radius: 16px; padding: 14px;
    margin-bottom: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    cursor: pointer; transition: transform .15s, box-shadow .15s;
  }
  .user-card:active { transform: scale(.98); }
  .user-card-header { display: flex; align-items: center; gap: 10px; }
  .user-avatar {
    width: 44px; height: 44px; border-radius: 12px;
    background: linear-gradient(135deg, #6C63FF, #8B5CF6);
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 18px; font-weight: 700; flex-shrink: 0;
  }
  .user-info { flex: 1; min-width: 0; }
  .user-name { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .user-email { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .plan-badge {
    padding: 4px 10px; border-radius: 20px;
    font-size: 11px; font-weight: 700; flex-shrink: 0;
    white-space: nowrap;
  }
  .plan-free    { background: #F3F4F6; color: #6B7280; }
  .plan-pro     { background: #EDE9FE; color: #6C63FF; }
  .plan-trial   { background: #D1FAE5; color: #059669; }
  .plan-expired { background: #FEE2E2; color: #DC2626; }

  .user-meta {
    display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap;
  }
  .meta-chip {
    font-size: 11px; color: var(--muted);
    background: var(--bg); padding: 3px 8px; border-radius: 6px;
    display: flex; align-items: center; gap: 4px;
  }
  .meta-chip.warn { background: #FEF3C7; color: var(--warning); }
  .meta-chip.ok   { background: #D1FAE5; color: var(--success); }

  /* ── Empty / Loading ── */
  .empty { text-align: center; padding: 48px 16px; color: var(--muted); }
  .empty svg { width: 56px; height: 56px; margin-bottom: 12px; opacity: .4; }
  .loading {
    display: flex; align-items: center; justify-content: center;
    padding: 48px; gap: 12px; color: var(--muted);
  }
  .spinner {
    width: 24px; height: 24px; border: 3px solid var(--border);
    border-top-color: var(--primary); border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Modal ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.5); z-index: 200;
    align-items: flex-end; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: white; border-radius: 24px 24px 0 0;
    padding: 20px 20px 32px; width: 100%; max-width: 500px;
    max-height: 92vh; overflow-y: auto;
    animation: slideUp .25s ease;
  }
  @keyframes slideUp { from { transform: translateY(100%); } }
  .modal-handle {
    width: 40px; height: 4px; background: var(--border);
    border-radius: 2px; margin: 0 auto 16px;
  }
  .modal-title {
    font-size: 17px; font-weight: 700; margin-bottom: 16px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-close {
    width: 30px; height: 30px; border-radius: 8px;
    background: var(--bg); border: none; cursor: pointer;
    font-size: 16px; display: flex; align-items: center; justify-content: center;
  }
  .detail-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 0; border-bottom: 1px solid var(--border);
    font-size: 14px;
  }
  .detail-row:last-child { border-bottom: none; }
  .detail-label { color: var(--muted); font-size: 13px; }
  .detail-value { font-weight: 500; text-align: right; max-width: 60%; word-break: break-all; }

  .edit-section { margin-top: 20px; }
  .edit-section h3 { font-size: 14px; font-weight: 700; margin-bottom: 12px; color: var(--primary); }
  .edit-row { margin-bottom: 12px; }
  .edit-row label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 5px; }
  .edit-row select, .edit-row input {
    width: 100%; padding: 10px 12px;
    border: 1.5px solid var(--border); border-radius: 10px;
    font-size: 14px; outline: none; background: white;
  }
  .edit-row select:focus, .edit-row input:focus { border-color: var(--primary); }

  .btn-save {
    width: 100%; padding: 13px; background: var(--primary);
    color: white; border: none; border-radius: 12px;
    font-size: 15px; font-weight: 600; cursor: pointer;
    margin-top: 16px; transition: opacity .2s;
  }
  .btn-save:hover { opacity: .88; }
  .btn-save:disabled { opacity: .5; cursor: not-allowed; }
  .btn-save.success { background: var(--success); }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #1A1D23; color: white; padding: 12px 20px;
    border-radius: 12px; font-size: 13px; font-weight: 500;
    z-index: 999; opacity: 0; transition: opacity .3s;
    white-space: nowrap; pointer-events: none;
  }
  .toast.show { opacity: 1; }

  .section-title {
    font-size: 13px; font-weight: 700; color: var(--muted);
    text-transform: uppercase; letter-spacing: .5px;
    margin-bottom: 8px; margin-top: 4px;
  }

  @media (max-width: 400px) {
    .stats-grid { grid-template-columns: repeat(3, 1fr); gap: 6px; }
    .stat-card { padding: 12px 6px; }
    .stat-card .num { font-size: 20px; }
  }
</style>
</head>
<body>

<!-- ── LOGIN ─────────────────────────────────────── -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">
      <div style="width:72px;height:72px;border-radius:18px;background:linear-gradient(135deg,#6C63FF,#8B5CF6);display:flex;align-items:center;justify-content:center;margin:0 auto 12px">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      </div>
      <h1>Kasva Admin</h1>
      <p>Panel Manajemen Pengguna</p>

    <div class="form-group">

    <div style="margin-top:16px;border-top:1px solid var(--border);padding-top:14px;">
      <p style="font-size:12px;color:var(--muted);text-align:center;margin-bottom:10px;">
        Belum punya akun admin?
      </p>
      <button class="btn-primary" onclick="showRegister()"
        style="background:white;color:var(--primary);border:1.5px solid var(--primary);">
        Buat Akun Admin Baru
      </button>
    </div>

    <!-- Register form (hidden by default) -->
    <div id="registerSection" style="display:none;margin-top:16px;border-top:1px solid var(--border);padding-top:14px;">
      <p style="font-size:13px;font-weight:600;margin-bottom:12px;">Buat Akun Admin</p>
      <div class="form-group">
        <label>Email Admin Baru</label>
        <input type="email" id="regEmail" placeholder="admin@kasvapos.com" />
      </div>
      <div class="form-group">
        <label>Password (min. 6 karakter)</label>
        <input type="password" id="regPass" placeholder="••••••••" />
      </div>
      <div class="form-group">
        <label>Konfirmasi Password</label>
        <input type="password" id="regPassConf" placeholder="••••••••"
          onkeydown="if(event.key==='Enter') doRegister()" />
      </div>
      <button class="btn-primary" onclick="doRegister()" id="regBtn"
        style="background:var(--success);">
        Buat Akun
      </button>
      <div class="error-msg" id="regError"></div>
      <p style="font-size:11px;color:var(--muted);margin-top:10px;text-align:center;line-height:1.5;">
        ⚠️ Setelah buat akun, update Firestore Security Rules<br>
        dengan email ini agar bisa akses semua data user.
      </p>
    </div>
  </div>
</div>

<!-- ── APP ───────────────────────────────────────── -->
<div id="appScreen">
  <div class="top-bar">
    <div class="top-bar-inner">
      <h1>⚡ Kasva Admin</h1>
      <div class="top-bar-right">
        <span class="admin-badge" id="adminEmail">Admin</span>
        <button class="btn-logout" onclick="doLogout()">Keluar</button>

  <div class="main">

    <div class="stats-grid" id="statsGrid">

      <div class="stat-card green"><div class="num" id="statPro">-</div><div class="lbl">Pro Aktif</div></div>

<!-- ── MODAL DETAIL ───────────────────────────────── -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modalContent">
    <div class="modal-handle"></div>
    <div class="modal-title">
      <span>Detail Pengguna</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>

    <div id="modalBody"><!-- dynamic --></div>

    <div class="edit-section">
      <h3>✏️ Ubah Status</h3>
      <div class="edit-row">
        <label>Plan</label>
        <select id="editPlan">
          <option value="free">Free</option>
          <option value="pro">Pro</option>
        </select>
      </div>
      <div class="edit-row" id="editExpiryRow">
        <label>Tanggal Expired</label>
        <input type="date" id="editExpiry" />
      </div>
      <div class="edit-row">
        <label>Trial Sampai (kosongkan jika bukan trial)</label>
        <input type="date" id="editTrial" />
      </div>
      <button class="btn-save" id="saveBtn" onclick="saveUser()">💾 Simpan Perubahan</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- ── FIREBASE SDK ───────────────────────────────── -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import {
  getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword,
  signOut, onAuthStateChanged
} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import {
  getFirestore, collection, getDocs, doc, updateDoc, query, orderBy
} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

// ── Firebase Config (dari google-services.json Anda) ──
const firebaseConfig = {
  apiKey:     "AIzaSyDVCEAaOUJ2_a8uxQw2QvOtpBjVwI6IRR0",
  authDomain: "kasva-d19fa.firebaseapp.com",
  projectId:  "kasva-d19fa",
  storageBucket: "kasva-d19fa.firebasestorage.app",
  messagingSenderId: "110994025196",
  appId:      "1:110994025196:android:6f38ac65f6852c763493c9"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

let allUsers      = [];
let currentUserId = null;

// ── Format tanggal ────────────────────────────────
function fmtDate(val) {
  if (!val) return '-';
  try {
    const d = val.toDate ? val.toDate() : new Date(val);
    if (isNaN(d.getTime())) return '-';
    return d.toLocaleDateString('id-ID', { day:'2-digit', month:'short', year:'numeric' });
  } catch { return '-'; }
}
function fmtDateInput(val) {
  if (!val) return '';
  try {
    const d = val.toDate ? val.toDate() : new Date(val);
    if (isNaN(d.getTime())) return '';
    return d.toISOString().split('T')[0];
  } catch { return ''; }
}

// ── Tentukan status plan ──────────────────────────
function getPlanStatus(u) {
  const now = new Date();
  const trial = u.trialUntil ? (u.trialUntil.toDate ? u.trialUntil.toDate() : new Date(u.trialUntil)) : null;
  const expiry = u.planExpiry ? (u.planExpiry.toDate ? u.planExpiry.toDate() : new Date(u.planExpiry)) : null;

  if (trial && trial > now) return 'trial';
  if (u.plan === 'pro' && expiry && expiry > now) return 'pro';
  if (u.plan === 'pro' && (!expiry || expiry <= now)) return 'expired';
  return 'free';
}

function planBadge(status) {
  const map = {
    free:    ['plan-free',    'FREE'],
    pro:     ['plan-pro',     'PRO'],
    trial:   ['plan-trial',   'TRIAL'],
    expired: ['plan-expired', 'EXPIRED'],
  };
  const [cls, lbl] = map[status] || map.free;
  return `<span class="plan-badge ${cls}">${lbl}</span>`;
}

// ── Auth state ────────────────────────────────────
onAuthStateChanged(auth, user => {
  if (user) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appScreen').style.display   = 'block';
    document.getElementById('adminEmail').textContent     = user.email || 'Admin';
    loadUsers();
  } else {
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('appScreen').style.display   = 'none';
  }
});

// ── Show register form ────────────────────────────
window.showRegister = () => {
  const sec = document.getElementById('registerSection');
  sec.style.display = sec.style.display === 'none' ? 'block' : 'none';
};

// ── Register admin ────────────────────────────────
window.doRegister = async () => {
  const email    = document.getElementById('regEmail').value.trim();
  const pass     = document.getElementById('regPass').value;
  const passConf = document.getElementById('regPassConf').value;
  const errEl    = document.getElementById('regError');
  const btn      = document.getElementById('regBtn');

  errEl.textContent = '';
  if (!email || !pass) { errEl.textContent = 'Email dan password wajib diisi'; return; }
  if (pass.length < 6) { errEl.textContent = 'Password minimal 6 karakter'; return; }
  if (pass !== passConf) { errEl.textContent = 'Password tidak cocok'; return; }

  btn.textContent = 'Membuat akun...';
  btn.disabled    = true;

  try {
    await createUserWithEmailAndPassword(auth, email, pass);
    // Setelah register langsung login otomatis via onAuthStateChanged
    showToast('✓ Akun admin berhasil dibuat! Jangan lupa update Firestore Rules.');
  } catch (e) {
    let msg = 'Gagal membuat akun';
    if (e.code === 'auth/email-already-in-use') msg = 'Email sudah terdaftar';
    if (e.code === 'auth/invalid-email')         msg = 'Format email tidak valid';
    if (e.code === 'auth/weak-password')         msg = 'Password terlalu lemah';
    errEl.textContent = msg;
    btn.textContent   = 'Buat Akun';
    btn.disabled      = false;
  }
};

// ── Login ─────────────────────────────────────────
window.doLogin = async () => {
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPass').value;
  const
